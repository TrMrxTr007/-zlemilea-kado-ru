<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özlem & Duhan</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="heart-particles"></div>

    <div class="container">
        <div class="header">
            <div class="profile">
                <img src="https://i.hizliresim.com/2jy2hdk.png" alt="Özlem">

            </div>

            <div class="profile">
                <img src="https://i.hizliresim.com/1zayqon.png" alt="Duhan">

            </div>
        </div>

        <div class="timer-section">
            <span id="timer">Yükleniyor...</span>
            <span class="label-text">AŞKIMIZIN SÜRESİ</span>
        </div>

        <div class="gallery">
            <img src="https://i.hizliresim.com/iuegukj.png">
            <img src="https://i.hizliresim.com/76nhomh.png">
            <img src="https://i.hizliresim.com/76o6pcg.png">
            <img src="https://i.hizliresim.com/kzf5h14.png">

    <script src="script.js"></script>

</html>
